services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ${APP_PREFIX:-sp-}n8n
    restart: unless-stopped
    user: root
    ports:
      - "5678:5678"
    environment:
      - TZ=Asia/Shanghai
      - GENERIC_TIMEZONE=Asia/Shanghai
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-n8npassword}
      - NODE_OPTIONS=--max-old-space-size=2048
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=5000
      # Firecrawl 在 knowledge 服务器上，需要跨服务器访问
      - FIRECRAWL_API_URL=http://${KNOWLEDGE_HOST:-192.168.7.220}:3002
      - HOST_DOCKER_INTERNAL=host.docker.internal
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # --- Bellkeeper API ---
      - BELLKEEPER_API_KEY=${BELLKEEPER_API_KEY:-}
      - BELLKEEPER_URL=${BELLKEEPER_INTERNAL_URL:-http://bellkeeper:8080}
      # --- 跨服务器服务地址 ---
      - FIRECRAWL_API_URL=${FIRECRAWL_API_URL:-http://192.168.7.220:3002}
      - RAGFLOW_API_URL=${RAGFLOW_API_URL:-http://192.168.7.220:8080}
      # --- Matrix 通知 ---
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-}
      - MATRIX_BOT_TOKEN=${MATRIX_BOT_TOKEN:-}
      - MATRIX_ROOM_ALERTS=${MATRIX_ROOM_ALERTS:-}
      - MATRIX_ROOM_DAILY=${MATRIX_ROOM_DAILY:-}
      - MATRIX_ROOM_TODO=${MATRIX_ROOM_TODO:-}
      # 多端存储所需的环境变量
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-}
      - MEMOS_API_TOKEN=${MEMOS_API_TOKEN:-}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      # knowledge 服务器地址 (供 n8n Code 节点使用)
      - KNOWLEDGE_HOST=${KNOWLEDGE_HOST:-192.168.7.220}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - kp-n8n-data:/home/node/.n8n
    networks:
      - kp-network

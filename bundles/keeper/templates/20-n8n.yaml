services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ${APP_PREFIX:-sp-}n8n
    restart: unless-stopped
    user: root
    ports:
      - "5678:5678"
    entrypoint: ["/bin/sh"]
    command: ["/home/node/scripts/n8n-init.sh"]
    environment:
      # 仅保留 Docker 层面必需的变量 (几乎不变, 无需热更新)
      # 其余所有变量由 init 脚本从挂载的 .env 文件动态加载
      # → 修改 .env 后只需 docker compose restart n8n, 无需 up -d 重建容器
      - TZ=Asia/Shanghai
      - GENERIC_TIMEZONE=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - kp-n8n-data:/home/node/.n8n
      - ./n8n-init.sh:/home/node/scripts/n8n-init.sh:ro
      - ./n8n-workflows:/home/node/n8n-workflows:ro
      - ./.env:/home/node/config/.env:ro
    networks:
      - kp-network

# ==============================================================================
#  Bellkeeper - Knowledge Management System
#  描述: Go + SolidJS 全栈应用
#  依赖: PostgreSQL (独立实例), 连接 RagFlow (跨服务器) / n8n (同机)
# ==============================================================================

services:
  bellkeeper:
    build:
      context: ./bellkeeper
      dockerfile: docker/Dockerfile
    image: bellkeeper:latest
    container_name: ${APP_PREFIX:-sp-}bellkeeper
    restart: unless-stopped
    ports:
      - "8090:8080"
    entrypoint: ["/bin/sh"]
    command: ["/app/scripts/bellkeeper-init.sh"]
    environment:
      # 仅保留 Docker 层面必需的变量 (几乎不变, 无需热更新)
      # 其余所有变量由 init 脚本从挂载的 .env 文件动态加载
      # → 修改 .env 后只需 docker compose restart bellkeeper, 无需 up -d 重建容器
      - TZ=Asia/Shanghai
    volumes:
      - ./bellkeeper-init.sh:/app/scripts/bellkeeper-init.sh:ro
      - ./.env:/app/config/.env:ro
      - /mnt/NAS/data/knowledge:/mnt/knowledge:rw
    depends_on:
      bellkeeper-db:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - kp-network
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  bellkeeper-db:
    image: postgres:16-alpine
    container_name: ${APP_PREFIX:-sp-}bellkeeper-db
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - POSTGRES_DB=bellkeeper
      - POSTGRES_USER=bellkeeper
      - POSTGRES_PASSWORD=${BELLKEEPER_DB_PASSWORD:-bellkeeper123}
    volumes:
      - kp-bellkeeper-db:/var/lib/postgresql/data
    networks:
      - kp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bellkeeper -d bellkeeper"]
      interval: 10s
      timeout: 5s
      retries: 5

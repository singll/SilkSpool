services:
  redis:
    image: redis:7-alpine
    container_name: ${APP_PREFIX:-sp-}redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - kp-redis-data:/data
    networks:
      - kp-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
